<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AIMagicBot Web App</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #menu, #smallMenu { display: none; margin-top: 20px; }
        button { margin: 5px; padding: 10px 20px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; }
        #startBtn { background-color: #007bff; color: #fff; }
        .mainButton { background-color: #333; color: #fff; width: 250px; text-align: left; }
        .smallButton { background-color: #555; color: #fff; width: 180px; text-align: left; font-size: 14px; }
    </style>
</head>
<body>
    <button id="startBtn">СТАРТ</button>

    <!-- Главное меню -->
    <div id="menu"></div>

    <!-- Малое меню -->
    <div id="smallMenu"></div>

    <script>
        // Telegram WebApp объект
        const tg = window.Telegram.WebApp;

        // При загрузке страницы показываем кнопку СТАРТ
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("menu").style.display = "none";
            document.getElementById("smallMenu").style.display = "none";
            document.getElementById("startBtn").style.display = "block";
        });

        // Нажатие кнопки СТАРТ
        document.getElementById("startBtn").addEventListener("click", function() {
            showMainMenu();
            this.style.display = "none";
        });

        // Функция отображения главного меню
        function showMainMenu() {
            const menuDiv = document.getElementById("menu");
            menuDiv.innerHTML = `
                <button class="mainButton" onclick="sendAction('chat_gpt')">💬 Чат GPT</button>
                <button class="mainButton" onclick="sendAction('photo')">🖼 Улучшение фото</button>
                <button class="mainButton" onclick="sendAction('image')">🌄 Генерация изображений</button>
                <button class="mainButton" onclick="sendAction('voice')">🎤 Голосовой перевод</button>
                <button class="mainButton" onclick="sendAction('buy_credits')">💰 Купить кредиты</button>
                <button class="mainButton" onclick="sendAction('bonus')">🎁 Бонусы/рефералы</button>
                <button class="mainButton" onclick="sendAction('history')">📜 История</button>
                <button class="mainButton" onclick="sendAction('refund')">⚠️ /refund</button>
            `;
            menuDiv.style.display = "block";
            showSmallMenu();
        }

        // Функция отображения малого меню
        function showSmallMenu() {
            const smallDiv = document.getElementById("smallMenu");
            smallDiv.innerHTML = `
                <button class="smallButton" onclick="sendAction('lang')">/lang — смена языка</button>
                <button class="smallButton" onclick="sendAction('admin')">/admin — админ-панель</button>
                <button class="smallButton" onclick="sendAction('limits')">/limits — описание лимитов</button>
            `;
            smallDiv.style.display = "block";
        }

        // Отправка действия боту
        function sendAction(action) {
            tg.sendData(action);
        }
    </script>
</body>
</html>
